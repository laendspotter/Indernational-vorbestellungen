<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vorbestellung bestätigt – Indernational</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0e1a; --surface: #131726; --border: #1e2236; --accent: #4caf7d; --text: #f0ede6; --muted: #7a7468; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(76,175,125,0.1) 0%, transparent 60%); pointer-events: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; max-width: 420px; width: 100%; text-align: center; position: relative; overflow: hidden; animation: fadeUp 0.6s ease both; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4caf7d, #52d99e); }

    .check { font-size: 3.6rem; margin-bottom: 16px; display: block; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.5; }

    .order-details { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.88rem; }
    .detail-row:not(:last-child) { border-bottom: 1px solid var(--border); }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 600; }

    .qr-section { margin-bottom: 28px; }
    .qr-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 14px; }
    .qr-wrap { background: white; border-radius: 12px; padding: 14px; display: inline-block; }
    .qr-wrap img { display: block; width: 160px; height: 160px; }

    .btn { display: inline-block; padding: 13px 28px; background: #4caf7d; color: #0b0e1a; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; text-decoration: none; transition: background 0.2s; border: none; cursor: pointer; width: 100%; }
    .btn:hover { background: #52d99e; }

    /* LOYALTY POPUP */
    .loyalty-popup { background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(245,166,35,0.08)); border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; padding: 24px; margin-top: 16px; display: none; animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    .loyalty-popup.show { display: block; }
    .lp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .lp-emoji { font-size: 2rem; }
    .lp-title { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 1.1rem; }
    .lp-sub { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }
    .lp-reward { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
    .lp-reward-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .lp-reward-row { display: flex; align-items: center; gap: 10px; }
    .lp-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .lp-bar-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #f5a623); border-radius: 3px; width: 0%; transition: width 0.8s ease 0.5s; }
    .lp-account-btn { display: block; width: 100%; padding: 12px; background: linear-gradient(90deg, #a78bfa, #f5a623); color: #0b0e1a; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-decoration: none; text-align: center; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  
    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 200;
      background: rgba(19,23,38,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #1e2236;
      color: #f0ede6;
      padding: 8px 14px 8px 10px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, background 0.2s;
    }
    .back-btn:hover { border-color: #f5a623; background: rgba(19,23,38,0.95); }


    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f2ee;
        --surface: #ffffff;
        --border: #e2dfd8;
        --text: #1a1816;
        --muted: #8a8680;
      }
    }
    [data-theme="light"] {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --border: #e2dfd8;
      --text: #1a1816;
      --muted: #8a8680;
    }
    [data-theme="dark"] {
      --bg: #0b0e1a;
      --surface: #131726;
      --border: #1e2236;
      --text: #f0ede6;
      --muted: #7a7468;
    }

    .theme-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 500; width: 42px; height: 42px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, transform 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .theme-toggle:hover { border-color: var(--accent, #f5a623); transform: scale(1.1); }
  
    body.light {
      --bg: #f4f2ec;
      --surface: #ffffff;
      --surface2: #eeeae0;
      --border: #ddd8cc;
      --text: #1a1916;
      --muted: #8a8070;
    }
  </style>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
<a href="index.html" class="back-btn">‹ Zurück</a>
  <div class="card">
    <span class="check">✅</span>
    <h1 id="title">Vorbestellung bestätigt!</h1>
    <p class="subtitle" id="subtitle">Zeigen Sie den QR-Code bei der Abholung vor.</p>

    <div class="order-details" id="orderDetails" style="display:none;">
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value" id="dName">–</span></div>
      <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="dDate">–</span></div>
      <div class="detail-row"><span class="detail-label">Menü</span><span class="detail-value" id="dMenu">–</span></div>
      <div class="detail-row" id="dDrinkRow" style="display:none;"><span class="detail-label">Getränk</span><span class="detail-value" id="dDrink">–</span></div>
      <div class="detail-row"><span class="detail-label">Zahlung</span><span class="detail-value" id="dZahlung">–</span></div>
    </div>

    <div class="qr-section" id="qrSection" style="display:none;">
      <div class="qr-label">QR-Code zur Abholung</div>
      <div class="qr-wrap">
        <img id="qrImg" src="" alt="QR Code" />
      </div>
    </div>

    <!-- LOYALTY POPUP -->
    <div class="loyalty-popup" id="loyaltyPopup">
      <div class="lp-header">
        <span class="lp-emoji" id="lpEmoji">⭐</span>
        <div>
          <div class="lp-title" id="lpTitle">Punkte gesammelt!</div>
          <div class="lp-sub" id="lpSub">–</div>
        </div>
      </div>
      <div class="lp-reward" id="lpReward" style="display:none;">
        <div class="lp-reward-label">Nächste Belohnung</div>
        <div class="lp-reward-row">
          <span id="lpRewardIcon">🎁</span>
          <div style="flex:1;">
            <div style="font-size:0.85rem;font-weight:600;margin-bottom:4px;" id="lpRewardName">–</div>
            <div class="lp-bar"><div class="lp-bar-fill" id="lpBar"></div></div>
          </div>
          <span style="font-size:0.8rem;color:#a78bfa;font-weight:700;" id="lpRewardPts">–</span>
        </div>
      </div>
      <a href="account.html" class="lp-account-btn">Punkte ansehen ⭐</a>
    </div>

    <a href="index.html" class="btn" style="margin-top:10px;">Zurück zur Startseite</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(location.search);
    const sessionId = params.get('session_id');
    const orderJson = params.get('order'); // for bar orders

    async function init() {
      let bestellung = null;

      if (orderJson) {
        // bar order passed via URL
        try { bestellung = JSON.parse(decodeURIComponent(orderJson)); } catch(e) {}
      } else if (sessionId) {
        // stripe order - fetch from supabase
        const { data } = await db.from('vorbestellungen').select('*').eq('stripe_session_id', sessionId).single();
        bestellung = data;
      }

      if (!bestellung) return;

      // show order details
      document.getElementById('orderDetails').style.display = 'block';
      document.getElementById('dName').textContent = bestellung.name;
      document.getElementById('dDate').textContent = new Date(bestellung.datum + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit' });
      document.getElementById('dMenu').textContent = bestellung.menu === 'menu1' ? 'Menü 1' : 'Menü 2';
      document.getElementById('dZahlung').textContent = bestellung.zahlung === 'online' ? '💳 Bezahlt' : '💵 Bar bei Abholung';

      if (bestellung.getraenk) {
        document.getElementById('dDrinkRow').style.display = 'flex';
        document.getElementById('dDrink').textContent = bestellung.getraenk;
      }

      // generate QR code
      const qrData = JSON.stringify({
        id: bestellung.id || sessionId,
        name: bestellung.name,
        datum: bestellung.datum,
        menu: bestellung.menu,
        typ: bestellung.typ,
        getraenk: bestellung.getraenk || ''
      });
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;
      document.getElementById('qrImg').src = qrUrl;
      document.getElementById('qrSection').style.display = 'block';
    }

    init();

    // loyalty popup
    async function initLoyalty() {
      const params = new URLSearchParams(location.search);
      const pts = parseInt(params.get('pts') || '0');
      const email = params.get('email');
      if (!pts || !email) return;

      const db2 = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // get current total
      const { data } = await db2.from('loyalty_punkte').select('punkte').eq('email', decodeURIComponent(email)).maybeSingle();
      const total = data?.punkte || pts;

      // show popup
      document.getElementById('loyaltyPopup').classList.add('show');
      document.getElementById('lpTitle').textContent = `+${pts} Punkte gesammelt! 🎉`;
      document.getElementById('lpSub').textContent = `Du hast jetzt ${total.toLocaleString('de-DE')} Punkte insgesamt`;

      // next reward
      const { data: belohnungen } = await db2.from('loyalty_belohnungen').select('*').eq('aktiv', true).order('punkte_benoetigt');
      const next = belohnungen?.find(b => b.punkte_benoetigt > total);
      if (next) {
        document.getElementById('lpReward').style.display = 'block';
        const icon = next.typ === 'getraenk' ? '🥤' : next.typ === 'menue' ? '🍽️' : '🎁';
        document.getElementById('lpRewardIcon').textContent = icon;
        document.getElementById('lpEmoji').textContent = icon;
        document.getElementById('lpRewardName').textContent = next.name + ' – noch ' + (next.punkte_benoetigt - total).toLocaleString('de-DE') + ' Pkt';
        document.getElementById('lpRewardPts').textContent = next.punkte_benoetigt.toLocaleString('de-DE') + ' ⭐';
        const pct = Math.min(100, (total / next.punkte_benoetigt * 100)).toFixed(0);
        setTimeout(() => document.getElementById('lpBar').style.width = pct + '%', 200);
      }
    }
    initLoyalty();
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Dark/Light Mode">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';
    })();
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
    }
  </script>
  <script>(function(){if(localStorage.getItem('theme')==='light'){document.body.classList.add('light');document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeToggle');if(b)b.textContent='☀️';});}})()</script>
</body>
</html>
