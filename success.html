<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahlung erfolgreich</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0e1a; --surface: #131726; --border: #1e2236; --accent: #4caf7d; --text: #f0ede6; --muted: #7a7468; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(76,175,125,0.1) 0%, transparent 60%); pointer-events: none; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; max-width: 440px; width: 100%; text-align: center; position: relative; overflow: hidden; animation: fadeUp 0.6s ease both; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4caf7d, #52d99e); }
    .check { font-size: 4rem; margin-bottom: 20px; display: block; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 14px 32px; background: #4caf7d; color: #0b0e1a; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .btn:hover { background: #52d99e; transform: translateY(-1px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="card">
    <span class="check">✅</span>
    <h1>Zahlung erfolgreich!</h1>
    <p>Ihre Vorbestellung wurde bestätigt und bezahlt. Wir freuen uns auf Ihren Besuch!</p>
    <a href="index.html" class="btn">Zurück zur Startseite</a>
  </div>
</body>
</html>
