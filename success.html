<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bestätigung – Indernational</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b0e1a" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0e1a; --surface: #131726; --border: #1e2236; --accent: #f5a623; --text: #f0ede6; --muted: #7a7468; --success: #4caf7d; --loyalty: #a78bfa; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px 80px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 0%, rgba(245,166,35,0.06) 0%, transparent 60%); pointer-events: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; max-width: 440px; width: 100%; text-align: center; position: relative; z-index: 1; animation: fadeUp 0.6s ease both; }
    .check { font-size: 3rem; display: block; margin-bottom: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }

    .order-details { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 600; }

    .qr-section { margin-bottom: 20px; }
    .qr-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .qr-wrap { background: white; border-radius: 12px; padding: 16px; display: inline-block; }
    .qr-wrap img { width: 180px; height: 180px; display: block; }

    .btn { display: block; padding: 14px; background: var(--accent); color: #0b0e1a; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; text-decoration: none; margin-top: 12px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }

    /* LOYALTY */
    .loyalty-box { display: none; background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(245,166,35,0.07)); border: 1px solid rgba(167,139,250,0.35); border-radius: 14px; padding: 20px; margin-top: 20px; text-align: left; }
    .loyalty-box.show { display: block; animation: fadeUp 0.5s ease 0.3s both; }
    .lp-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .lp-emoji { font-size: 2rem; }
    .lp-pts { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 1.1rem; }
    .lp-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .lp-reward { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
    .lp-reward-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .lp-reward-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .lp-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .lp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--loyalty), var(--accent)); border-radius: 3px; width: 0%; transition: width 0.8s ease 0.5s; }
    .lp-btn { display: block; width: 100%; padding: 11px; background: linear-gradient(90deg, var(--loyalty), var(--accent)); color: #0b0e1a; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; text-decoration: none; text-align: center; cursor: pointer; }

    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--success); color: white; padding: 12px 22px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .version-footer { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: rgba(122,116,104,0.4); pointer-events: none; z-index: 10; }
    body.light { --bg: #f4f2ec; --surface: #ffffff; --border: #ddd8cc; --text: #1a1916; --muted: #8a8070; }
    .theme-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 500; width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="card">
    <span class="check">✅</span>
    <h1 id="title">Vorbestellung bestätigt!</h1>
    <p class="subtitle" id="subtitle">QR-Code bei der Abholung vorzeigen.</p>

    <div class="order-details" id="orderDetails" style="display:none;">
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value" id="dName">–</span></div>
      <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="dDate">–</span></div>
      <div class="detail-row"><span class="detail-label">Menü</span><span class="detail-value" id="dMenu">–</span></div>
      <div class="detail-row" id="dDrinkRow" style="display:none;"><span class="detail-label">Getränk</span><span class="detail-value" id="dDrink">–</span></div>
      <div class="detail-row"><span class="detail-label">Zahlung</span><span class="detail-value" id="dZahlung">–</span></div>
    </div>

    <div class="qr-section" id="qrSection" style="display:none;">
      <div class="qr-label">QR-Code zur Abholung</div>
      <div class="qr-wrap"><img id="qrImg" src="" alt="QR Code" /></div>
    </div>

    <!-- LOYALTY -->
    <div class="loyalty-box" id="loyaltyBox">
      <div class="lp-top">
        <span class="lp-emoji" id="lpEmoji">⭐</span>
        <div>
          <div class="lp-pts" id="lpPts">+0 Punkte gesammelt!</div>
          <div class="lp-sub" id="lpSub">–</div>
        </div>
      </div>
      <div class="lp-reward" id="lpReward" style="display:none;">
        <div class="lp-reward-label">Nächste Belohnung</div>
        <div class="lp-reward-row">
          <span id="lpRewardIcon">🎁</span>
          <div style="flex:1;margin:0 8px;">
            <div style="font-weight:600;margin-bottom:4px;" id="lpRewardName">–</div>
            <div class="lp-bar-wrap"><div class="lp-bar-fill" id="lpBarFill"></div></div>
          </div>
          <span style="color:var(--loyalty);font-weight:700;font-size:0.82rem;" id="lpRewardPts">–</span>
        </div>
      </div>
      <a href="loyalty.html" class="lp-btn" id="lpBtn">⭐ Meine Punkte ansehen</a>
    </div>

    <div style="display:flex;gap:10px;margin-top:12px;">
      <a href="index.html" class="btn" style="flex:1;text-align:center;background:transparent;border:1px solid var(--border);color:var(--muted);">Startseite</a>
      <a id="nochmalBtn" href="kantine.html" class="btn" style="flex:1;text-align:center;">Nochmal bestellen →</a>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button id="calendarBtn" onclick="addToCalendar()" style="flex:1;padding:10px;background:transparent;border:1px solid rgba(66,133,244,0.4);color:#4285f4;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;display:none;">📅 Kalender</button>
      <button id="shareBtn" onclick="shareOrder()" style="flex:1;padding:10px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;display:none;">🔗 Teilen</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
  <div class="version-footer">ver 1.5.0</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── ORDER DETAILS ──
    async function init() {
      // read from sessionStorage (bar orders) or URL params (stripe)
      const storedOrder = sessionStorage.getItem('lastOrder');
      let orderParam, sessionId, storedPts = 0, storedEmail = '';
      if (storedOrder) {
        storedPts = parseInt(sessionStorage.getItem('lastOrderPts') || '0');
        storedEmail = sessionStorage.getItem('lastOrderEmail') || '';
        sessionStorage.removeItem('lastOrder');
        sessionStorage.removeItem('lastOrderPts');
        sessionStorage.removeItem('lastOrderEmail');
        orderParam = encodeURIComponent(storedOrder);
        sessionId = null;
      } else {
        const params = new URLSearchParams(location.search);
        orderParam = params.get('order');
        sessionId = params.get('session_id');
        storedPts = parseInt(params.get('pts') || '0');
        storedEmail = params.get('email') || '';
      }

      if (orderParam) {
        try {
          const o = JSON.parse(decodeURIComponent(orderParam));
          document.getElementById('orderDetails').style.display = 'block';
          document.getElementById('dName').textContent = o.name || '–';
          document.getElementById('dDate').textContent = o.datum ? new Date(o.datum + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit' }) : '–';
          document.getElementById('dMenu').textContent = o.menu === 'menu1' ? 'Menü 1' : 'Menü 2';
          document.getElementById('dZahlung').textContent = o.zahlung === 'online' ? '💳 Bezahlt' : '💵 Bar bei Abholung';
          if (o.getraenk) { document.getElementById('dDrinkRow').style.display = 'flex'; document.getElementById('dDrink').textContent = o.getraenk; }
          const qrData = JSON.stringify({ id: o.id, name: o.name, datum: o.datum, menu: o.menu, typ: o.typ, getraenk: o.getraenk || '' });
          document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}`;
          document.getElementById('qrSection').style.display = 'block';
          document.getElementById('calendarBtn').style.display = 'block';
          document.getElementById('shareBtn').style.display = 'block';
          window._currentOrder = o;
          const nochmalBtn = document.getElementById('nochmalBtn');
          if (nochmalBtn) nochmalBtn.href = o.typ === 'truck' ? 'truck.html' : 'kantine.html';
        } catch(e) {}
      }

      // ── LOYALTY ──
      const pts = storedPts || 0;
      const emailRaw = storedEmail || '';
      const email = emailRaw ? decodeURIComponent(emailRaw) : '';

      if (pts > 0 && email) {
        const box = document.getElementById('loyaltyBox');
        box.classList.add('show');
        document.getElementById('lpPts').textContent = `+${pts} Punkte gesammelt! 🎉`;

        // set loyalty page link with email
        document.getElementById('lpBtn').href = `loyalty.html?email=${encodeURIComponent(email)}`;

        // get current total from db
        const { data: kd } = await db.from('loyalty_punkte').select('punkte').eq('email', email).maybeSingle();
        const total = kd?.punkte || pts;
        document.getElementById('lpSub').textContent = `Du hast jetzt ${total.toLocaleString('de-DE')} Punkte insgesamt`;

        // next reward
        const { data: belohnungen } = await db.from('loyalty_belohnungen').select('*').eq('aktiv', true).order('punkte_benoetigt');
        const next = belohnungen?.find(b => b.punkte_benoetigt > total);
        if (next) {
          document.getElementById('lpReward').style.display = 'block';
          const icon = next.typ === 'getraenk' ? '🥤' : next.typ === 'menue' ? '🍽️' : '🎁';
          document.getElementById('lpEmoji').textContent = icon;
          document.getElementById('lpRewardIcon').textContent = icon;
          document.getElementById('lpRewardName').textContent = `${next.name} – noch ${Math.max(0, next.punkte_benoetigt - total).toLocaleString('de-DE')} Pkt`;
          document.getElementById('lpRewardPts').textContent = next.punkte_benoetigt.toLocaleString('de-DE') + ' ⭐';
          const pct = Math.min(100, (total / next.punkte_benoetigt * 100)).toFixed(0);
          setTimeout(() => document.getElementById('lpBarFill').style.width = pct + '%', 500);
        }
      }
    }

    init();

    function addToCalendar() {
      const o = window._currentOrder;
      if (!o) return;
      try {
        const dateStr = o.datum ? o.datum.replace(/-/g,'') : '';
        const startTime = '120000'; // 12:00
        const endTime = '130000';   // 13:00
        const title = encodeURIComponent('🍴 Mittagessen abholen – Indernational');
        const details = encodeURIComponent((o.menu === 'menu1' ? 'Menü 1' : 'Menü 2') + (o.getraenk ? ' + ' + o.getraenk : '') + '\nZahlung: ' + (o.zahlung === 'online' ? 'Online bezahlt' : 'Bar'));
        const location = encodeURIComponent('Bahnhofstraße 37, 72202 Nagold');
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}T${startTime}/${dateStr}T${endTime}&details=${details}&location=${location}`;
        window.open(url, '_blank');
      } catch(e) {}
    }

    function shareOrder() {
      const o = window._currentOrder;
      if (!o) return;
      try {
        const menuLabel = o.menu === 'menu1' ? 'Menü 1' : 'Menü 2';
        const dateStr = o.datum ? new Date(o.datum + 'T00:00:00').toLocaleDateString('de-DE', {weekday:'long',day:'2-digit',month:'2-digit'}) : '';
        const text = `🍴 Ich habe ${menuLabel} bei Indernational vorbestellt (${dateStr})`;
        if (navigator.share) {
          navigator.share({ title: 'Indernational Bestellung', text, url: 'https://indernational-vorbestellungssystem.vercel.app' });
        } else {
          navigator.clipboard.writeText(text + ' – indernational-vorbestellungssystem.vercel.app');
          showToast('✓ Link kopiert!');
        }
      } catch(e) {}
    }

    // set nochmal bestellen link
    // nochmal btn is set via window._currentOrder in init

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
</body>
</html>
