<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrieren – Indernational</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0e1a; --surface: #131726; --border: #1e2236;
      --accent: #f5a623; --accent-dark: #c47d0e;
      --text: #f0ede6; --muted: #7a7468;
      --success: #4caf7d; --error: #e05c5c; --radius: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 20%, rgba(245,166,35,0.07) 0%, transparent 60%); pointer-events: none; }

    .logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: 0.08em; color: #f2efeb; text-transform: uppercase; margin-bottom: 32px; text-decoration: none; animation: fadeUp 0.6s ease both; }
    .logo span { color: #f2efeb; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 400px; position: relative; overflow: hidden; animation: fadeUp 0.6s ease 0.1s both; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); }

    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 7px; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 13px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,166,35,0.12); }

    .btn { width: 100%; padding: 14px; background: var(--accent); color: #0b0e1a; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 8px; }
    .btn:hover { background: #f0b83a; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 0.78rem; color: var(--muted); }

    .google-btn { width: 100%; padding: 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { border-color: var(--accent); background: rgba(245,166,35,0.04); }

    .error-msg { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--error); margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    .success-msg { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); border-radius: 8px; padding: 14px; font-size: 0.9rem; color: var(--success); display: none; text-align: center; }
    .success-msg.show { display: block; }

    .footer-link { margin-top: 24px; text-align: center; font-size: 0.88rem; color: var(--muted); animation: fadeUp 0.6s ease 0.2s both; }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <a href="index.html" class="logo">Indernational</a>

  <div class="card">
    <h1>Konto erstellen</h1>
    <p class="subtitle">Einmal registrieren, immer schnell bestellen.</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">✓ Bestätigungsmail gesendet! Bitte prüfen Sie Ihr Postfach.</div>

    <div id="formContent">
      <div class="form-group">
        <label for="name">Ihr Name</label>
        <input type="text" id="name" placeholder="Max Mustermann" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="max@beispiel.de" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="Mindestens 6 Zeichen" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()" />
      </div>

      <button class="btn" id="registerBtn" onclick="register()">Konto erstellen</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">oder</span>
        <div class="divider-line"></div>
      </div>

      <button class="google-btn" onclick="registerGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Mit Google registrieren
      </button>
    </div>
  </div>

  <div class="footer-link">
    Bereits ein Konto? <a href="login.html">Anmelden</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    db.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.classList.add('show');
    }

    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name) return showError('Bitte geben Sie Ihren Namen ein.');
      if (!email) return showError('Bitte geben Sie Ihre E-Mail ein.');
      if (password.length < 6) return showError('Passwort muss mindestens 6 Zeichen haben.');

      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Konto wird erstellt…';

      const { error } = await db.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });

      btn.disabled = false; btn.textContent = 'Konto erstellen';

      if (error) {
        showError(error.message === 'User already registered' ? 'Diese E-Mail ist bereits registriert.' : error.message);
      } else {
        document.getElementById('formContent').style.display = 'none';
        document.getElementById('successMsg').classList.add('show');
      }
    }

    async function registerGoogle() {
      await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: location.origin + '/index.html' }
      });
    }
  </script>
</body>
</html>
