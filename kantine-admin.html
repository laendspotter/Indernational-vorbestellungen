<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantine – Verwaltung</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0e1a; --surface: #131726; --surface2: #191d30; --border: #1e2236;
      --accent: #3ecf8e; --accent-dark: #2aaa72;
      --text: #e8f0ec; --muted: #6b7d74;
      --success: #3ecf8e; --error: #e05c5c; --radius: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 0%, rgba(62,207,142,0.06) 0%, transparent 60%); pointer-events: none; }

    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; width: 100%; max-width: 380px; text-align: center; animation: fadeUp 0.5s ease both; position: relative; overflow: hidden; }
    .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); }
    .login-icon { font-size: 40px; margin-bottom: 16px; }
    .login-card h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; margin-bottom: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
    .login-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(62,207,142,0.15); }
    .login-btn { width: 100%; padding: 14px; background: var(--accent); color: #0c0f0e; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .login-btn:hover { background: #52d99e; transform: translateY(-1px); }
    .login-error { color: var(--error); font-size: 0.85rem; margin-top: 12px; display: none; }

    #adminPanel { display: none; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
    .topbar h1 span { color: var(--accent); }
    .live-badge { background: rgba(62,207,142,0.12); color: var(--success); border: 1px solid rgba(62,207,142,0.25); border-radius: 50px; padding: 4px 10px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    .main { padding: 32px; max-width: 1000px; margin: 0 auto; }

    .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
    .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--accent); color: #0c0f0e; }

    .filters { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
    .filter-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
    .filter-input:focus { outline: none; border-color: var(--accent); }
    input[type="date"].filter-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    .filter-btn { padding: 10px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #0c0f0e; border-color: var(--accent); }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; }
    .stat-number { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

    .section-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .orders-list { display: flex; flex-direction: column; gap: 10px; }
    .order-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; transition: border-color 0.2s, opacity 0.3s; animation: fadeUp 0.3s ease both; }
    .order-item.done { opacity: 0.5; border-color: transparent; }
    .order-item.done .order-name { text-decoration: line-through; }
    .order-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(62,207,142,0.12); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; flex-shrink: 0; }
    .order-info { flex: 1; }
    .order-name { font-weight: 600; font-size: 0.95rem; }
    .order-meta { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
    .menu-badge { padding: 4px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: 700; background: rgba(62,207,142,0.12); color: var(--accent); }
    .done-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .done-btn:hover { background: var(--success); border-color: var(--success); color: #0c0f0e; }
    .order-item.done .done-btn { background: rgba(62,207,142,0.12); border-color: rgba(62,207,142,0.25); color: var(--success); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    .menu-editor { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .menu-editor-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .menu-editor-header h3 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-nav-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .week-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .week-label { font-size: 0.9rem; font-weight: 600; min-width: 160px; text-align: center; }
    .day-rows { display: flex; flex-direction: column; }
    .day-row { border-bottom: 1px solid var(--border); padding: 16px 24px; display: grid; grid-template-columns: 80px 1fr 1fr; gap: 16px; align-items: center; transition: background 0.15s; }
    .day-row:last-child { border-bottom: none; }
    .day-row:hover { background: var(--surface2); }
    .day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .menu-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; }
    .menu-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(62,207,142,0.12); }
    .menu-input::placeholder { color: var(--muted); }
    .menu-editor-footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
    .save-btn { padding: 12px 28px; background: var(--accent); color: #0c0f0e; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .save-btn:hover { background: #52d99e; transform: translateY(-1px); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .input-label-row { display: flex; gap: 16px; padding: 0 24px 8px; }
    .input-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .input-label:first-child { flex: 0 0 80px; visibility: hidden; }
    .input-label:nth-child(2), .input-label:nth-child(3) { flex: 1; }

    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--success); color: #0c0f0e; padding: 12px 22px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @media (max-width: 600px) {
      .topbar { padding: 14px 20px; }
      .main { padding: 20px; }
      .order-item { flex-wrap: wrap; }
      .day-row { grid-template-columns: 60px 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <div class="login-icon">🍽️</div>
      <h2>Kantine Verwaltung</h2>
      <p>Bitte melden Sie sich an, um fortzufahren.</p>
      <input type="password" class="login-input" id="pwInput" placeholder="Passwort" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Anmelden</button>
      <div class="login-error" id="loginError">Falsches Passwort.</div>
    </div>
  </div>

  <div id="adminPanel">
    <div class="topbar">
      <div class="topbar-left">
        <h1>🍽️ <span>Kantine</span> Verwaltung</h1>
        <div class="live-badge"><div class="live-dot"></div> Live</div>
      </div>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>

    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" id="tabBestellungen" onclick="showTab('bestellungen')">📋 Bestellungen</button>
        <button class="tab-btn" id="tabMenu" onclick="showTab('menu')">🍴 Wochenmenü</button>
      </div>

      <div id="tabContentBestellungen">
        <div class="filters">
          <input type="date" class="filter-input" id="filterDate" onchange="applyFilters()" />
          <button class="filter-btn active" id="btnAlle" onclick="setFilter('alle')">Alle</button>
          <button class="filter-btn" id="btnOffen" onclick="setFilter('offen')">Offen</button>
          <button class="filter-btn" id="btnErledigt" onclick="setFilter('erledigt')">Erledigt</button>
        </div>
        <div class="stats">
          <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Gesamt</div></div>
          <div class="stat-card"><div class="stat-number" id="statOffen">0</div><div class="stat-label">Offen</div></div>
          <div class="stat-card"><div class="stat-number" id="statMenu1">0</div><div class="stat-label">Menü 1</div></div>
          <div class="stat-card"><div class="stat-number" id="statMenu2">0</div><div class="stat-label">Menü 2</div></div>
        </div>
        <div class="section-title">Vorbestellungen</div>
        <div class="orders-list" id="ordersList">
          <div class="empty-state"><div class="icon">📋</div><p>Lade Bestellungen…</p></div>
        </div>
      </div>

      <div id="tabContentMenu" style="display:none;">
        <div class="menu-editor">
          <div class="menu-editor-header">
            <h3>Wochenmenü eintragen</h3>
            <div class="week-nav">
              <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
              <span class="week-label" id="weekLabel">–</span>
              <button class="week-nav-btn" onclick="changeWeek(1)">›</button>
            </div>
          </div>
          <div class="input-label-row">
            <span class="input-label">Tag</span>
            <span class="input-label">Menü 1</span>
            <span class="input-label">Menü 2</span>
          </div>
          <div class="day-rows" id="dayRows"></div>
          <div class="menu-editor-footer">
            <button class="save-btn" id="saveMenuBtn" onclick="saveMenu()">Speichern</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allOrders = [], currentFilter = 'alle', realtimeChannel = null;
    let currentWeekStart = null;
    const DAYS = ['mo','di','mi','do','fr'];
    const DAY_NAMES = { mo: 'Montag', di: 'Dienstag', mi: 'Mittwoch', do: 'Donnerstag', fr: 'Freitag' };

    function login() {
      const pw = document.getElementById('pwInput').value;
      if (pw === ADMIN_PASSWORDS.kantine) {
        sessionStorage.setItem('kantine_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        initAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('kantine_auth');
      if (realtimeChannel) db.removeChannel(realtimeChannel);
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('pwInput').value = '';
    }

    if (sessionStorage.getItem('kantine_auth')) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      initAdmin();
    }

    async function initAdmin() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('filterDate').value = today;
      currentWeekStart = getWeekStart(today);
      await loadOrders();
      subscribeRealtime();
      renderMenuEditor();
      await loadMenuData();
    }

    function showTab(tab) {
      document.getElementById('tabContentBestellungen').style.display = tab === 'bestellungen' ? 'block' : 'none';
      document.getElementById('tabContentMenu').style.display = tab === 'menu' ? 'block' : 'none';
      document.getElementById('tabBestellungen').classList.toggle('active', tab === 'bestellungen');
      document.getElementById('tabMenu').classList.toggle('active', tab === 'menu');
    }

    async function loadOrders() {
      const { data, error } = await db.from('vorbestellungen').select('*').eq('typ', 'kantine').order('created_at', { ascending: false });
      if (!error) { allOrders = data || []; renderOrders(); }
    }

    function subscribeRealtime() {
      realtimeChannel = db.channel('kantine-orders')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'vorbestellungen', filter: 'typ=eq.kantine' }, payload => {
          if (payload.eventType === 'INSERT') { allOrders.unshift(payload.new); showToast('Neue Vorbestellung eingegangen!'); }
          else if (payload.eventType === 'UPDATE') { const i = allOrders.findIndex(o => o.id === payload.new.id); if (i !== -1) allOrders[i] = payload.new; }
          else if (payload.eventType === 'DELETE') { allOrders = allOrders.filter(o => o.id !== payload.old.id); }
          renderOrders();
        }).subscribe();
    }

    function setFilter(f) {
      currentFilter = f;
      ['btnAlle','btnOffen','btnErledigt'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(f === 'alle' ? 'btnAlle' : f === 'offen' ? 'btnOffen' : 'btnErledigt').classList.add('active');
      renderOrders();
    }

    function applyFilters() { renderOrders(); }

    function getFilteredOrders() {
      const dateVal = document.getElementById('filterDate').value;
      return allOrders.filter(o => {
        const dm = !dateVal || o.datum === dateVal;
        const sm = currentFilter === 'alle' || (currentFilter === 'offen' && !o.erledigt) || (currentFilter === 'erledigt' && o.erledigt);
        return dm && sm;
      });
    }

    function renderOrders() {
      const orders = getFilteredOrders();
      const dateVal = document.getElementById('filterDate').value;
      const af = allOrders.filter(o => !dateVal || o.datum === dateVal);
      document.getElementById('statTotal').textContent = af.length;
      document.getElementById('statOffen').textContent = af.filter(o => !o.erledigt).length;
      document.getElementById('statMenu1').textContent = af.filter(o => o.menu === 'menu1').length;
      document.getElementById('statMenu2').textContent = af.filter(o => o.menu === 'menu2').length;
      const list = document.getElementById('ordersList');
      if (orders.length === 0) { list.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Keine Bestellungen gefunden.</p></div>`; return; }
      list.innerHTML = orders.map(o => `
        <div class="order-item ${o.erledigt ? 'done' : ''}">
          <div class="order-avatar">${o.name.charAt(0).toUpperCase()}</div>
          <div class="order-info">
            <div class="order-name">${esc(o.name)}</div>
            <div class="order-meta">${formatDate(o.datum)} · ${formatTime(o.created_at)}</div>
          </div>
          <span class="menu-badge">${o.menu === 'menu1' ? 'Menü 1' : 'Menü 2'}</span>
          <button class="done-btn" onclick="toggleDone('${o.id}', ${o.erledigt})">${o.erledigt ? '✓ Erledigt' : 'Als erledigt markieren'}</button>
        </div>`).join('');
    }

    async function toggleDone(id, currentState) {
      await db.from('vorbestellungen').update({ erledigt: !currentState }).eq('id', id);
    }

    function getWeekStart(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff)).toISOString().split('T')[0];
    }

    function changeWeek(dir) {
      const d = new Date(currentWeekStart + 'T00:00:00');
      d.setDate(d.getDate() + dir * 7);
      currentWeekStart = d.toISOString().split('T')[0];
      renderMenuEditor();
      loadMenuData();
    }

    function renderMenuEditor() {
      const ws = new Date(currentWeekStart + 'T00:00:00');
      const we = new Date(ws); we.setDate(we.getDate() + 4);
      document.getElementById('weekLabel').textContent =
        `${ws.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit'})} – ${we.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'})}`;
      document.getElementById('dayRows').innerHTML = DAYS.map(dk => `
        <div class="day-row">
          <div class="day-name">${DAY_NAMES[dk]}</div>
          <input class="menu-input" id="inp_${dk}_1" placeholder="Menü 1 für ${DAY_NAMES[dk]}" />
          <input class="menu-input" id="inp_${dk}_2" placeholder="Menü 2 für ${DAY_NAMES[dk]}" />
        </div>`).join('');
    }

    async function loadMenuData() {
      const { data } = await db.from('menus').select('*').eq('typ', 'kantine').eq('woche_start', currentWeekStart).maybeSingle();
      DAYS.forEach(dk => {
        document.getElementById(`inp_${dk}_1`).value = data ? (data[`${dk}_menu1`] || '') : '';
        document.getElementById(`inp_${dk}_2`).value = data ? (data[`${dk}_menu2`] || '') : '';
      });
    }

    async function saveMenu() {
      const btn = document.getElementById('saveMenuBtn');
      btn.disabled = true; btn.textContent = 'Speichern…';
      const payload = { typ: 'kantine', woche_start: currentWeekStart };
      DAYS.forEach(dk => {
        payload[`${dk}_menu1`] = document.getElementById(`inp_${dk}_1`).value.trim();
        payload[`${dk}_menu2`] = document.getElementById(`inp_${dk}_2`).value.trim();
      });
      const { error } = await db.from('menus').upsert(payload, { onConflict: 'typ,woche_start' });
      btn.disabled = false; btn.textContent = 'Speichern';
      if (error) { showToast('Fehler beim Speichern.'); console.error(error); }
      else { showToast('✓ Menü gespeichert!'); }
    }

    function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' }); }
    function formatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }); }
    function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
