<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kantine – Verwaltung</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0f0e;
      --surface: #161a18;
      --surface2: #1c211e;
      --border: #272e2b;
      --accent: #3ecf8e;
      --accent-dark: #2aaa72;
      --text: #e8f0ec;
      --muted: #6b7d74;
      --success: #3ecf8e;
      --error: #e05c5c;
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(62,207,142,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    }

    .login-icon { font-size: 40px; margin-bottom: 16px; }

    .login-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(62,207,142,0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0c0f0e;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .login-btn:hover { background: #52d99e; transform: translateY(-1px); }
    .login-error { color: var(--error); font-size: 0.85rem; margin-top: 12px; display: none; }

    #adminPanel { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .topbar h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .topbar h1 span { color: var(--accent); }

    .live-badge {
      background: rgba(62,207,142,0.12);
      color: var(--success);
      border: 1px solid rgba(62,207,142,0.25);
      border-radius: 50px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    .main { padding: 32px; max-width: 1000px; margin: 0 auto; }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .filter-input:focus { outline: none; border-color: var(--accent); }
    input[type="date"].filter-input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

    .filter-btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--accent);
      color: #0c0f0e;
      border-color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .orders-list { display: flex; flex-direction: column; gap: 10px; }

    .order-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s, opacity 0.3s;
      animation: fadeUp 0.3s ease both;
    }

    .order-item.done { opacity: 0.5; border-color: transparent; }
    .order-item.done .order-name { text-decoration: line-through; }

    .order-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(62,207,142,0.12);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .order-info { flex: 1; }
    .order-name { font-weight: 600; font-size: 0.95rem; }
    .order-meta { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

    .menu-badge {
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(62,207,142,0.12);
      color: var(--accent);
    }

    .done-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .done-btn:hover {
      background: var(--success);
      border-color: var(--success);
      color: #0c0f0e;
    }

    .order-item.done .done-btn {
      background: rgba(62,207,142,0.12);
      border-color: rgba(62,207,142,0.25);
      color: var(--success);
    }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #0c0f0e;
      padding: 12px 22px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    @media (max-width: 600px) {
      .topbar { padding: 14px 20px; }
      .main { padding: 20px; }
      .order-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <div class="login-icon">🍽️</div>
      <h2>Kantine Verwaltung</h2>
      <p>Bitte melden Sie sich an, um fortzufahren.</p>
      <input type="password" class="login-input" id="pwInput" placeholder="Passwort" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Anmelden</button>
      <div class="login-error" id="loginError">Falsches Passwort.</div>
    </div>
  </div>

  <div id="adminPanel">
    <div class="topbar">
      <div class="topbar-left">
        <h1>🍽️ <span>Kantine</span> Verwaltung</h1>
        <div class="live-badge"><div class="live-dot"></div> Live</div>
      </div>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>

    <div class="main">
      <div class="filters">
        <input type="date" class="filter-input" id="filterDate" onchange="applyFilters()" />
        <button class="filter-btn active" id="btnAlle" onclick="setFilter('alle')">Alle</button>
        <button class="filter-btn" id="btnOffen" onclick="setFilter('offen')">Offen</button>
        <button class="filter-btn" id="btnErledigt" onclick="setFilter('erledigt')">Erledigt</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">Gesamt</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statOffen">0</div>
          <div class="stat-label">Offen</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statMenu1">0</div>
          <div class="stat-label">Menü 1</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statMenu2">0</div>
          <div class="stat-label">Menü 2</div>
        </div>
      </div>

      <div class="section-title">Vorbestellungen</div>
      <div class="orders-list" id="ordersList">
        <div class="empty-state"><div class="icon">📋</div><p>Lade Bestellungen…</p></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allOrders = [];
    let currentFilter = 'alle';
    let realtimeChannel = null;

    function login() {
      const pw = document.getElementById('pwInput').value;
      if (pw === ADMIN_PASSWORDS.kantine) {
        sessionStorage.setItem('kantine_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        initAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('kantine_auth');
      if (realtimeChannel) db.removeChannel(realtimeChannel);
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('pwInput').value = '';
    }

    if (sessionStorage.getItem('kantine_auth')) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      initAdmin();
    }

    async function initAdmin() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('filterDate').value = today;
      await loadOrders();
      subscribeRealtime();
    }

    async function loadOrders() {
      const { data, error } = await db
        .from('vorbestellungen')
        .select('*')
        .eq('typ', 'kantine')
        .order('created_at', { ascending: false });

      if (!error) {
        allOrders = data || [];
        renderOrders();
      }
    }

    function subscribeRealtime() {
      realtimeChannel = db.channel('kantine-orders')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'vorbestellungen',
          filter: 'typ=eq.kantine'
        }, payload => {
          if (payload.eventType === 'INSERT') {
            allOrders.unshift(payload.new);
            showToast('Neue Vorbestellung eingegangen!');
          } else if (payload.eventType === 'UPDATE') {
            const idx = allOrders.findIndex(o => o.id === payload.new.id);
            if (idx !== -1) allOrders[idx] = payload.new;
          } else if (payload.eventType === 'DELETE') {
            allOrders = allOrders.filter(o => o.id !== payload.old.id);
          }
          renderOrders();
        })
        .subscribe();
    }

    function setFilter(f) {
      currentFilter = f;
      ['btnAlle','btnOffen','btnErledigt'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(f === 'alle' ? 'btnAlle' : f === 'offen' ? 'btnOffen' : 'btnErledigt').classList.add('active');
      renderOrders();
    }

    function applyFilters() { renderOrders(); }

    function getFilteredOrders() {
      const dateVal = document.getElementById('filterDate').value;
      return allOrders.filter(o => {
        const dateMatch = !dateVal || o.datum === dateVal;
        const statusMatch = currentFilter === 'alle' ||
          (currentFilter === 'offen' && !o.erledigt) ||
          (currentFilter === 'erledigt' && o.erledigt);
        return dateMatch && statusMatch;
      });
    }

    function renderOrders() {
      const orders = getFilteredOrders();
      const allFiltered = allOrders.filter(o => {
        const dateVal = document.getElementById('filterDate').value;
        return !dateVal || o.datum === dateVal;
      });

      document.getElementById('statTotal').textContent  = allFiltered.length;
      document.getElementById('statOffen').textContent  = allFiltered.filter(o => !o.erledigt).length;
      document.getElementById('statMenu1').textContent  = allFiltered.filter(o => o.menu === 'menu1').length;
      document.getElementById('statMenu2').textContent  = allFiltered.filter(o => o.menu === 'menu2').length;

      const list = document.getElementById('ordersList');

      if (orders.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Keine Bestellungen gefunden.</p></div>`;
        return;
      }

      list.innerHTML = orders.map(o => `
        <div class="order-item ${o.erledigt ? 'done' : ''}" id="order-${o.id}">
          <div class="order-avatar">${o.name.charAt(0).toUpperCase()}</div>
          <div class="order-info">
            <div class="order-name">${escapeHtml(o.name)}</div>
            <div class="order-meta">${formatDate(o.datum)} · ${formatTime(o.created_at)}</div>
          </div>
          <span class="menu-badge">${o.menu === 'menu1' ? 'Menü 1' : 'Menü 2'}</span>
          <button class="done-btn" onclick="toggleDone('${o.id}', ${o.erledigt})">
            ${o.erledigt ? '✓ Erledigt' : 'Als erledigt markieren'}
          </button>
        </div>
      `).join('');
    }

    async function toggleDone(id, currentState) {
      const { error } = await db
        .from('vorbestellungen')
        .update({ erledigt: !currentState })
        .eq('id', id);

      if (error) showToast('Fehler beim Aktualisieren.');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
    }

    function formatTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
